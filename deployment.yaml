apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperature-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temperature-simulator
  template:
    metadata:
      labels:
        app: temperature-simulator
    spec:
      containers:
        - name: temperature-simulator
          image: geertjanwielenga/temperature-simulator:latest
          ports:
            - containerPort: 8080
apiVersion: v1
kind: Service
metadata:
  name: temperature-simulator
spec:
  selector:
    app: temperature-simulator
  ports:
    - port: 80
      targetPort: 8080